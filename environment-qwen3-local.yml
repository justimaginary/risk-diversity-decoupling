# LEGACY: verified historical RTX 4060 environment. New rented runs use environment-rental.yml.
name: qwen3-dpo
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10.20
  - pip
  - pip:
      # CUDA 12.8 build used by the verified local RTX 4060 environment.
      - --extra-index-url https://download.pytorch.org/whl/cu128
      - torch==2.10.0+cu128
      - transformers==4.57.6
      - accelerate==1.10.1
      - datasets==3.6.0
      - trl==0.12.2
      - peft==0.10.0
      - sentence-transformers==2.6.1
      - scikit-learn==1.7.2
      - numpy==2.0.2
      - scipy==1.13.1
      - pandas==2.3.3
      - pyarrow==21.0.0
      - huggingface-hub==0.36.2
      - safetensors==0.7.0
      - tokenizers>=0.21,<0.23
      - sentencepiece
      - tiktoken
      - PyYAML==6.0.3
      - tqdm==4.67.3
      - modelscope==1.34.0
      - pytest
      - pytest-cov
