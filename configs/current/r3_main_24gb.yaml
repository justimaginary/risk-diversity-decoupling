stage: R3
purpose: qwen3_17b_strict_multiseed_main_experiment
hardware:
  tier: 24gb
  preferred: [RTX_4090_24GB]
  estimated_gpu_hours: [24, 48]
model:
  name: Qwen/Qwen3-1.7B
  method: dpo
  seeds: [42, 43, 44]
data_conditions:
  - D1_clean_safety
  - D2_helpfulness_safety_conflict
  - D4_full_refusal_suppression
training:
  pairs_per_condition: 200
  matched_token_budget: true
  max_steps: 100
  learning_rate: 1.0e-4
  beta: 0.1
  checkpoint_steps: [0, 50, 100]
  maximum_teacher_forced_mean_token_kl: 0.75
evaluation:
  harmbench_behaviors: 100
  samples_per_prompt: 32
  key_models_samples_per_prompt: 64
  xstest: full
  safety_judges: [granite_guardian, wildguard_or_harmbench, strongreject]
  diversity: [semantic_entropy, vendi, harmful_semantic_entropy, risk_mass_entropy]
statistics:
  hierarchical_bootstrap: true
  bootstrap_samples: 5000
  harmful_entropy_noninferiority_margin: 0.05
  noninferiority_for_diversity: true
gate:
  minimum_consistent_training_seeds: 3
  require_human_audit: true
  require_output_quality_pass: true
