# Local RTX 4060 smoke configuration.
# This file is intentionally small and CPU/GPU friendly. It is not a paper-grade
# experiment config.

model:
  name: "Qwen/Qwen2.5-0.5B-Instruct"
  ref_model: "Qwen/Qwen2.5-0.5B-Instruct"
  torch_dtype: "float16"
  attn_implementation: "eager"

data:
  train_dataset: "data/local_smoke_preferences.jsonl"
  attack_prompts_path: "data/attack_prompts.jsonl"
  num_attack_prompts: 10
  max_prompt_length: 256
  max_response_length: 128

training:
  beta: 0.1
  learning_rate: 5.0e-7
  max_steps: 50
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 4
  warmup_ratio: 0.1
  weight_decay: 0.01
  bf16: false
  fp16: true
  gradient_checkpointing: true
  save_steps: 25
  logging_steps: 5
  output_dir: "outputs/local_smoke/checkpoints"
  deepspeed: null

pce_monitoring:
  enabled: true
  eval_steps: 25
  num_samples: 16
  dbscan_eps: 0.35
  dbscan_min_samples: 2
  pce_threshold: 0.5
  early_stop_on_pce: false
  use_llamaguard: false

hardware:
  num_gpus: 1
  gpu_type: "RTX-4060-Laptop-8GB"
  mixed_precision: "fp16"

experiment:
  name: "s0_local_4060"
  seed: 42
  checkpoint_steps: [0, 25, 50]
  num_repeats: 1
