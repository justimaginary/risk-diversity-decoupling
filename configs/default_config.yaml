# ==============================================================================
# PCE Research Framework - Default Configuration
# ==============================================================================
# Configuration for Preference Collapse Exploitability experiments.
# Override values via command-line arguments or experiment-specific configs.

# -- Model Configuration --
model:
  # Base model for DPO training
  name: "meta-llama/Llama-2-7b-chat-hf"
  # Reference model (usually same as base before DPO)
  ref_model: "meta-llama/Llama-2-7b-chat-hf"
  # Model precision
  torch_dtype: "bfloat16"
  # Attention implementation
  attn_implementation: "flash_attention_2"

# -- Data Configuration --
data:
  # Preference dataset for DPO training
  train_dataset: "Anthropic/hh-rlhf"
  train_split: "train"
  eval_dataset: "Anthropic/hh-rlhf"
  eval_split: "test"
  # Attack evaluation prompts
  attack_prompts_path: "data/attack_prompts.jsonl"
  num_attack_prompts: 50
  # Maximum sequence lengths
  max_prompt_length: 512
  max_response_length: 256

# -- DPO Training Configuration --
training:
  # Standard DPO hyperparameters
  beta: 0.1
  learning_rate: 5.0e-7
  num_train_epochs: 1
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  warmup_ratio: 0.1
  weight_decay: 0.01
  max_grad_norm: 1.0
  # Optimization
  bf16: true
  gradient_checkpointing: true
  # Scheduler
  lr_scheduler_type: "cosine"
  # Checkpointing
  save_steps: 200
  save_total_limit: 10
  # Logging
  logging_steps: 10
  # Output
  output_dir: "outputs/dpo_training"
  # DeepSpeed
  deepspeed: "configs/ds_config_zero3.json"

# -- Entropy Regularization (ER-DPO) --
entropy_regularization:
  enabled: false
  lambda_h: 0.01
  lambda_h_schedule: "linear_warmup"  # constant, linear_warmup, cosine
  lambda_h_warmup_steps: 100
  lambda_h_max: 0.05
  entropy_eval_steps: 50

# -- PCE Monitoring Configuration --
pce_monitoring:
  enabled: true
  eval_steps: 100
  num_samples: 128
  # DBSCAN clustering parameters
  dbscan_eps: 0.3
  dbscan_min_samples: 5
  # Sentence embedding model
  sbert_model: "all-MiniLM-L6-v2"
  # LlamaGuard safety classifier
  llamaguard_model: "meta-llama/LlamaGuard-7b"
  # Thresholds
  pce_threshold: 0.5
  early_stop_on_pce: false

# -- Attack Configuration --
attacks:
  # Collapse Accelerator
  collapse_accelerator:
    enabled: true
    variant: "universal"  # targeted, universal, triggered
    num_poison_pairs: 500
    poison_ratio: 0.05
    num_candidate_samples: 32
    # Targeted variant
    target_mode_description: ""
    target_similarity_threshold: 0.8
    # Triggered variant
    trigger_phrase: ""
    trigger_position: "prefix"

  # Mode Probing
  mode_probing:
    enabled: true
    num_samples: 128
    dominance_threshold: 0.3
    harmful_threshold: 0.1

# -- Safety Evaluation --
safety_eval:
  num_samples: 64
  max_new_tokens: 256
  batch_size: 16
  safety_classifier_type: "llamaguard_causal_lm"
  llamaguard_model: "meta-llama/LlamaGuard-7b"
  safety_max_new_tokens: 16
  save_reports: true
  reports_dir: "outputs/safety_reports"

# -- Diversity Metrics --
diversity:
  compute_self_bleu: true
  self_bleu_sample_size: 1000
  compute_distinct_n: true
  compute_embedding_variance: true
  compute_cluster_count: true

# -- Wandb Configuration --
wandb:
  project: "pce-research"
  entity: null  # Set to your wandb team/username
  run_name: null  # Auto-generated if null
  tags:
    - "pce"
    - "dpo"
    - "safety"
  log_model: false

# -- Hardware Configuration --
hardware:
  # Number of GPUs (for multi-GPU runs)
  num_gpus: 4
  # GPU type (for resource estimation)
  gpu_type: "A100-80GB"
  # Mixed precision
  mixed_precision: "bf16"
  # DataLoader workers
  dataloader_num_workers: 4

# -- Experiment Configuration --
experiment:
  # Experiment name for organization
  name: "pce_characterization"
  # Random seed
  seed: 42
  # Checkpoints to evaluate (for sweep experiments)
  checkpoint_steps: [100, 200, 500, 1000, 2000, 5000]
  # Number of repetitions
  num_repeats: 3
